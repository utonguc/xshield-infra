version: "3.9"

# ─────────────────────────────────────────────
#  xShield Production Infrastructure
#
#  VPS dizin yapısı:
#    ~/xshield/web/      ← utonguc/xshield      (xshield.com.tr)
#    ~/xshield/eclinic/  ← utonguc/eclinic       (e-Clinic ürünü)
#    ~/xshield/signed/   ← utonguc/signed        (Signed ürünü)
#    ~/xshield/xcut/     ← utonguc/xcut          (xCut ürünü)
#    ~/xshield/infra/    ← utonguc/xshield-infra (bu dosya)
#
#  Yeni ürün eklemek için:
#    1. ~/xshield/<urun>/ dizinine repo'yu çek
#    2. Bu dosyaya servis ekle
#    3. nginx/prod.conf'a domain bloğu ekle
#    4. docker compose up -d --build <servis-adi>
#    5. docker compose up -d --force-recreate nginx
# ─────────────────────────────────────────────

services:

  # ── e-Clinic ──────────────────────────────
  eclinic_db:
    image: postgres:16
    container_name: eclinic_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${CLINIC_DB_NAME:-clinicdb}
      POSTGRES_USER: ${CLINIC_DB_USER:-clinicuser}
      POSTGRES_PASSWORD: ${CLINIC_DB_PASS:-clinicpass}
    volumes:
      - eclinic_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CLINIC_DB_USER:-clinicuser} -d ${CLINIC_DB_NAME:-clinicdb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  eclinic_redis:
    image: redis:7
    container_name: eclinic_redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  eclinic_backend:
    build:
      context: ../web/clinic/clinic-platform/backend
    container_name: eclinic_backend
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=eclinic_db;Port=5432;Database=${CLINIC_DB_NAME:-clinicdb};Username=${CLINIC_DB_USER:-clinicuser};Password=${CLINIC_DB_PASS:-clinicpass}
      Jwt__Key: ${CLINIC_JWT_KEY}
      Jwt__Issuer: clinic-platform
      Jwt__Audience: clinic-platform-users
      Jwt__ExpireMinutes: 120
      Smtp__Host: ${SMTP_HOST:-}
      Smtp__Port: ${SMTP_PORT:-587}
      Smtp__UseSsl: ${SMTP_SSL:-true}
      Smtp__UserName: ${SMTP_USER:-}
      Smtp__Password: ${SMTP_PASS:-}
      Smtp__FromAddress: ${SMTP_FROM:-}
      Smtp__FromName: ${SMTP_FROM_NAME:-xShield e-Clinic}
    depends_on:
      eclinic_db:
        condition: service_healthy
      eclinic_redis:
        condition: service_healthy
    volumes:
      - eclinic_uploads:/app/uploads

  eclinic_frontend:
    build:
      context: ../web/clinic/clinic-platform/frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: https://eclinic.xshield.com.tr/api
        NEXT_PUBLIC_BUILD_VERSION: v1.0.0
    container_name: eclinic_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: https://eclinic.xshield.com.tr/api
      API_BASE_URL: http://eclinic_backend:8080/api
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    depends_on:
      - eclinic_backend

  # ── xShield Web ───────────────────────────
  xshield_web:
    build:
      context: ../web
    container_name: xshield_web
    restart: unless-stopped
    environment:
      NODE_ENV: production

  # ── Signed Landing ────────────────────────
  signed_landing:
    build:
      context: ../signed/landing
    container_name: signed_landing
    restart: unless-stopped
    environment:
      NODE_ENV: production

  # ── Signed DB ─────────────────────────────
  signed_db:
    image: postgres:15
    container_name: signed_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: signature
      POSTGRES_USER: signature_user
      POSTGRES_PASSWORD: ${SIGNED_DB_PASS:-signature_pass}
    volumes:
      - signed_pgdata:/var/lib/postgresql/data
      - ../signed/init_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ../signed/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signature_user -d signature"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Signed API ────────────────────────────
  signed_api:
    build:
      context: ../signed/signature-core
    container_name: signed_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://signature_user:${SIGNED_DB_PASS:-signature_pass}@signed_db:5432/signature
      SIGNATURE_API_KEY: ${SIGNED_API_KEY:-change-in-prod}
      JWT_SECRET: ${SIGNED_JWT_SECRET:-change-this-jwt-secret-in-production}
      ADMIN_EMAIL: ${SIGNED_ADMIN_EMAIL:-admin@xshield.com.tr}
      ADMIN_PASSWORD: ${SIGNED_ADMIN_PASS:-changeme}
      PUBLIC_URL: https://appsigned.xshield.com.tr
      PORTAL_TOKEN_HOURS: "48"
    depends_on:
      signed_db:
        condition: service_healthy

  # ── Signed Panel ──────────────────────────
  signed_panel:
    build:
      context: ../signed/panel
    container_name: signed_panel
    restart: unless-stopped
    environment:
      API_URL: http://signed_api:5000
    depends_on:
      - signed_api

  # ── xCut ──────────────────────────────────
  xcut_db:
    image: postgres:16
    container_name: xcut_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${XCUT_DB_NAME:-xcutdb}
      POSTGRES_USER: ${XCUT_DB_USER:-xcutuser}
      POSTGRES_PASSWORD: ${XCUT_DB_PASS:-xcutpass}
    volumes:
      - xcut_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${XCUT_DB_USER:-xcutuser} -d ${XCUT_DB_NAME:-xcutdb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  xcut_backend:
    build:
      context: ../xcut/backend
    container_name: xcut_backend
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=xcut_db;Port=5432;Database=${XCUT_DB_NAME:-xcutdb};Username=${XCUT_DB_USER:-xcutuser};Password=${XCUT_DB_PASS:-xcutpass}
      Jwt__Key: ${XCUT_JWT_KEY}
      Jwt__Issuer: xcut-platform
      Jwt__Audience: xcut-platform-users
      Jwt__ExpireMinutes: 120
      Smtp__Host: ${SMTP_HOST:-}
      Smtp__Port: ${SMTP_PORT:-587}
      Smtp__UseSsl: ${SMTP_SSL:-true}
      Smtp__UserName: ${SMTP_USER:-}
      Smtp__Password: ${SMTP_PASS:-}
      Smtp__FromAddress: ${SMTP_FROM:-}
      Smtp__FromName: ${SMTP_FROM_NAME:-xCut}
    depends_on:
      xcut_db:
        condition: service_healthy
    volumes:
      - xcut_uploads:/app/uploads

  xcut_frontend:
    build:
      context: ../xcut/frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: https://xcut.xshield.com.tr/api
        NEXT_PUBLIC_BUILD_VERSION: v1.0.0
    container_name: xcut_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: https://xcut.xshield.com.tr/api
      API_BASE_URL: http://xcut_backend:8080/api
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    depends_on:
      - xcut_backend

  # ── nginx (ortak reverse proxy) ──────────
  nginx:
    image: nginx:stable
    container_name: xshield_nginx
    restart: unless-stopped
    depends_on:
      - eclinic_frontend
      - eclinic_backend
      - xshield_web
      - signed_landing
      - signed_panel
      - xcut_frontend
      - xcut_backend
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"

volumes:
  eclinic_postgres_data:
    external: true
    name: clinic-platform_postgres_prod_data
  eclinic_uploads:
    external: true
    name: clinic-platform_uploads_data
  signed_pgdata:
  xcut_pgdata:
  xcut_uploads:

networks:
  default:
    name: xshield-net
    external: true
